      <stop offset="0%" stop-color="#14211d"/>
      <stop offset="100%" stop-color="#2f5d50"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 마크 (favicon과 동일한 문서+돋보기) -->
